# The platform + agent are NOT configured here: each user brings their own
# provider (Anthropic, OpenAI, or Ollama), model, and key, so the agent is built
# per request from the user's stored settings — see App\Service\AgentFactory. (A
# single static platform/api_key in config can't be per-user.) The Symfony AI
# *components* are still used; only the bundle's config-driven agent is omitted.
