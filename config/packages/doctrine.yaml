doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        # Register the Symfony UUID DBAL type (entities use UUID v7 ids).
        types:
            uuid: 'Symfony\Bridge\Doctrine\Types\UuidType'
    orm:
        auto_generate_proxy_classes: true
        # PHP 8.4 native lazy objects: with an unpinned symfony/var-exporter
        # resolving to 8.x, the old LazyGhost proxies no longer exist.
        # Requires PHP >= 8.4 (the Dockerfile base image matches).
        enable_native_lazy_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
