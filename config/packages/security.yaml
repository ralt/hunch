security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_users:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_users
            form_login:
                login_path: login
                check_path: login
                enable_csrf: true
                default_target_path: home
            remember_me:
                secret: '%env(APP_SECRET)%'
                lifetime: 2592000 # 30 days
                # Single-household app with admin-created accounts: no
                # "remember me" checkbox, everyone gets the long cookie.
                always_remember_me: true
            logout:
                path: logout
                target: login

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/activate, roles: PUBLIC_ACCESS }   # set password on first login
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/, roles: ROLE_USER }
